<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RAG Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f12;
      --surface:   #141720;
      --border:    #252a35;
      --accent:    #4fffb0;
      --accent-dim:#1a5c3f;
      --text:      #dde2ed;
      --muted:     #5a6278;
      --user-bg:   #1b2230;
      --bot-bg:    #141720;
      --radius:    12px;
      --font-body: 'IBM Plex Sans', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.6;
    }

    /* ── Layout ── */
    .shell {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 780px;
      margin: 0 auto;
      padding: 0 16px;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 22px 0 18px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .logo {
      width: 34px; height: 34px;
      border-radius: 8px;
      background: var(--accent);
      display: grid; place-items: center;
      flex-shrink: 0;
    }
    .logo svg { width: 18px; height: 18px; }
    header h1 {
      font-family: var(--font-mono);
      font-size: 15px;
      font-weight: 500;
      letter-spacing: .04em;
      color: var(--text);
    }
    header h1 span { color: var(--accent); }
    .status {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: var(--muted);
      font-family: var(--font-mono);
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; } 50% { opacity:.3; }
    }

    /* ── Chat area ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px 0 8px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    /* Empty state */
    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--muted);
      text-align: center;
      padding-bottom: 60px;
    }
    .empty-icon {
      width: 52px; height: 52px;
      border-radius: 14px;
      border: 1px solid var(--border);
      display: grid; place-items: center;
      margin-bottom: 4px;
    }
    .empty p { font-size: 14px; }
    .empty strong { color: var(--text); font-weight: 500; }

    /* Message rows */
    .msg { display: flex; gap: 12px; animation: fadeUp .25s ease both; }
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(8px); }
      to   { opacity:1; transform: translateY(0); }
    }
    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 30px; height: 30px;
      border-radius: 8px;
      flex-shrink: 0;
      display: grid; place-items: center;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      margin-top: 2px;
    }
    .msg.user .avatar  { background: var(--accent-dim); color: var(--accent); }
    .msg.bot  .avatar  { background: var(--border); color: var(--muted); }

    .bubble {
      max-width: 86%;
      padding: 12px 16px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      font-size: 14.5px;
      line-height: 1.65;
    }
    .msg.user .bubble {
      background: var(--user-bg);
      border-color: #2a3248;
      border-bottom-right-radius: 3px;
    }
    .msg.bot .bubble {
      background: var(--bot-bg);
      border-bottom-left-radius: 3px;
    }

    /* Typing indicator */
    .typing-dots { display: flex; gap: 5px; padding: 4px 2px; }
    .typing-dots span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      animation: blink 1.2s ease-in-out infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .2s; }
    .typing-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes blink {
      0%,80%,100% { opacity:.25; transform: scale(.9); }
      40%          { opacity:1;   transform: scale(1); }
    }

    /* ── Input bar ── */
    .input-bar {
      flex-shrink: 0;
      padding: 16px 0 24px;
      border-top: 1px solid var(--border);
    }
    .input-wrap {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      transition: border-color .2s;
    }
    .input-wrap:focus-within { border-color: var(--accent-dim); }

    #question {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14.5px;
      line-height: 1.5;
      resize: none;
      max-height: 140px;
      min-height: 24px;
    }
    #question::placeholder { color: var(--muted); }

    #send-btn {
      width: 34px; height: 34px;
      flex-shrink: 0;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: #0d0f12;
      cursor: pointer;
      display: grid; place-items: center;
      transition: opacity .15s, transform .1s;
    }
    #send-btn:hover  { opacity: .85; }
    #send-btn:active { transform: scale(.93); }
    #send-btn:disabled { opacity: .3; cursor: default; transform: none; }
    #send-btn svg { width: 15px; height: 15px; }

    .hint {
      margin-top: 8px;
      font-size: 11.5px;
      color: var(--muted);
      text-align: center;
      font-family: var(--font-mono);
    }
  </style>
</head>
<body>
<div class="shell">

  <header>
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="#0d0f12" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </div>
    <h1>RAG<span>/</span>chat</h1>
    <div class="status"><div class="dot"></div>ollama · local</div>
  </header>

  <div id="chat">
    <div class="empty" id="empty-state">
      <div class="empty-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#5a6278" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <p><strong>Ask anything about your documents</strong></p>
      <p>Powered by your local RAG pipeline</p>
    </div>
  </div>

  <div class="input-bar">
    <div class="input-wrap">
      <textarea id="question" rows="1" placeholder="Ask a question…"></textarea>
      <button id="send-btn" title="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <p class="hint">Enter ↵ to send &nbsp;·&nbsp; Shift+Enter for new line</p>
  </div>

</div>

<script>
  const chat     = document.getElementById("chat");
  const emptyEl  = document.getElementById("empty-state");
  const textarea = document.getElementById("question");
  const sendBtn  = document.getElementById("send-btn");

  // Auto-grow textarea
  textarea.addEventListener("input", () => {
    textarea.style.height = "auto";
    textarea.style.height = Math.min(textarea.scrollHeight, 140) + "px";
  });

  // Enter = send, Shift+Enter = newline
  textarea.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  });
  sendBtn.addEventListener("click", handleSend);

  function appendMsg(role, html) {
    emptyEl.style.display = "none";
    const row = document.createElement("div");
    row.className = `msg ${role}`;
    row.innerHTML = `
      <div class="avatar">${role === "user" ? "you" : "rag"}</div>
      <div class="bubble">${html}</div>
    `;
    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;
    return row;
  }

  function showTyping() {
    return appendMsg("bot", `<div class="typing-dots"><span></span><span></span><span></span></div>`);
  }

  function escapeHtml(str) {
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");
  }

  async function handleSend() {
    const q = textarea.value.trim();
    if (!q) return;

    appendMsg("user", escapeHtml(q));
    textarea.value = "";
    textarea.style.height = "auto";
    sendBtn.disabled = true;

    const typingRow = showTyping();

    try {
      const res = await fetch("/query", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question: q })
      });
      const data = await res.json();
      typingRow.remove();
      if (data.error) {
        appendMsg("bot", `<span style="color:#ff6b6b">Error: ${escapeHtml(data.error)}</span>`);
      } else {
        appendMsg("bot", escapeHtml(data.answer));
      }
    } catch (err) {
      typingRow.remove();
      appendMsg("bot", `<span style="color:#ff6b6b">Could not reach the server. Is Flask running?</span>`);
    } finally {
      sendBtn.disabled = false;
      textarea.focus();
    }
  }
</script>
</body>
</html>
